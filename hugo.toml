baseURL = "https://harunohi88.github.io/"
languageCode = "ko-kr"
defaultContentLanguage = "ko"
title = "harunohi devlog"
theme = "PaperMod"
enableRobotsTXT = true
enableGitInfo = true
summaryLength = 28

[pagination]
  pagerSize = 8

[outputs]
  home = ["HTML", "RSS", "JSON"]

[minify]
  disableXML = true
  minifyOutput = true

[markup]
  [markup.highlight]
    noClasses = false
    lineNos = true
    codeFences = true
    guessSyntax = true
  [markup.goldmark.renderer]
    unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4

[params]
  env = "production"
  author = "harunohi"
  description = "C/C++ 임베디드, Linux Kernel, 펌웨어, Raspberry Pi, 리버스 엔지니어링 학습과 프로젝트를 기록하는 개발 블로그"
  keywords = ["C", "C++", "Embedded", "Linux", "Linux Kernel", "Firmware", "Raspberry Pi", "Reverse Engineering"]
  defaultTheme = "auto"
  disableThemeToggle = false
  mainSections = ["posts"]
  searchSections = ["posts", "projects"]
  DateFormat = "2006. 01. 02"
  ShowReadingTime = true
  ShowCodeCopyButtons = true
  ShowBreadCrumbs = true
  ShowPostNavLinks = true
  ShowToc = true
  TocOpen = false
  ShowShareButtons = true
  ShareButtons = ["linkedin", "x"]
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  ShowFullTextinRSS = true
  displayFullLangName = true
  comments = false

  [params.label]
    text = "harunohi.dev"

  [params.homeInfoParams]
    Title = "하드웨어 가까이에서, 소프트웨어를 깊게."
    Content = """
**C/C++ 임베디드, Linux Kernel, 펌웨어와 리버스 엔지니어링**을 공부하며
직접 실험하고 문제를 해결한 과정을 기록합니다.

<div class="hero-actions">
  <a class="primary-action" href="/posts/">학습 기록</a>
  <a class="secondary-action" href="/projects/">프로젝트</a>
</div>
"""

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/harunohi88"
  [[params.socialIcons]]
    name = "rss"
    url = "/index.xml"

  [params.assets]
    disableFingerprinting = true
    favicon = "/favicon.svg"
    favicon16x16 = "/favicon.svg"
    favicon32x32 = "/favicon.svg"
    apple_touch_icon = "/favicon.svg"

  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.3
    minMatchCharLength = 2
    keys = ["title", "permalink", "summary", "content", "tags", "categories"]

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "글"
    url = "/posts/"
    weight = 10
  [[menu.main]]
    identifier = "tags"
    name = "태그"
    url = "/tags/"
    weight = 20
  [[menu.main]]
    identifier = "categories"
    name = "분류"
    url = "/categories/"
    weight = 25
  [[menu.main]]
    identifier = "projects"
    name = "프로젝트"
    url = "/projects/"
    weight = 30
  [[menu.main]]
    identifier = "archives"
    name = "아카이브"
    url = "/archives/"
    weight = 40
  [[menu.main]]
    identifier = "search"
    name = "검색"
    url = "/search/"
    weight = 50
  [[menu.main]]
    identifier = "about"
    name = "소개"
    url = "/about/"
    weight = 60

[taxonomies]
  tag = "tags"
  category = "categories"
  series = "series"

[privacy]
  [privacy.x]
    enableDNT = true
  [privacy.youtube]
    privacyEnhanced = true
